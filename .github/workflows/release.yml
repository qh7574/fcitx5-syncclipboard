name: Android Release APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore.jks"

      - name: Inject signing config (init script)
        run: |
          cat > "$RUNNER_TEMP/signing.gradle" <<'EOF'
          gradle.beforeProject { p ->
              p.afterEvaluate {
                  if (p.plugins.hasPlugin("com.android.application")) {
                      def android = p.extensions.findByName("android")
                      if (android != null) {
                          android.signingConfigs {
                              release {
                                  storeFile = file(System.getenv("KEYSTORE_PATH"))
                                  storePassword = System.getenv("KEYSTORE_PASSWORD")
                                  keyAlias = System.getenv("KEY_ALIAS")
                                  keyPassword = System.getenv("KEY_PASSWORD")
                              }
                          }
                          android.buildTypes.release.signingConfig = android.signingConfigs.release
                      }
                  }
              }
          }
          EOF

      - name: Resolve version tag
        id: version
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName\s*=\s*"\(.*\)".*/\1/p' app/build.gradle.kts | head -n 1)
          if [ -z "$VERSION_NAME" ]; then
            echo "versionName not found in app/build.gradle.kts" >&2
            exit 1
          fi
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Create or update tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag -f "$TAG"
          git push -f origin "$TAG"

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease -I "$RUNNER_TEMP/signing.gradle"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
