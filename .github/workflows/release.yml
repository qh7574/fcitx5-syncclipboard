name: Android Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore.jks"

      - name: Inject signing config (init script)
        run: |
          cat > "$RUNNER_TEMP/signing.gradle" <<'EOF'
          gradle.beforeProject { p ->
              p.afterEvaluate {
                  if (p.plugins.hasPlugin("com.android.application")) {
                      def android = p.extensions.findByName("android")
                      if (android != null) {
                          android.signingConfigs {
                              release {
                                  storeFile = file(System.getenv("KEYSTORE_PATH"))
                                  storePassword = System.getenv("KEYSTORE_PASSWORD")
                                  keyAlias = System.getenv("KEY_ALIAS")
                                  keyPassword = System.getenv("KEY_PASSWORD")
                              }
                          }
                          android.buildTypes.release.signingConfig = android.signingConfigs.release
                      }
                  }
              }
          }
          EOF

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease -I "$RUNNER_TEMP/signing.gradle"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
